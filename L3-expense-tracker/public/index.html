<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">

    <header>
      <h1>Expense Tracker</h1>
      <div class="total-card">
        <span class="total-label">Total Spent</span>
        <span id="total" class="total-amount">$0.00</span>
      </div>
    </header>

    <section class="add-expense">
      <h2>Add Expense</h2>
      <form id="expense-form">
        <input
          type="text"
          id="description"
          placeholder="Description (e.g. Coffee)"
          required
          autocomplete="off"
        >
        <input
          type="number"
          id="amount"
          placeholder="Amount"
          step="0.01"
          min="0.01"
          required
        >
        <select id="category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
        <input
          type="text"
          id="subcategory"
          placeholder="Subcategory (optional)"
          autocomplete="off"
        >
        <button type="submit" class="btn-add">Add Expense</button>
      </form>
    </section>

    <div id="status-message" class="status" role="alert"></div>

    <section class="expense-list">
      <div class="list-header">
        <h2>Expenses</h2>
        <select id="category-filter">
          <option value="all">All categories</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Description</th>
              <th>Amount</th>
              <th>Category</th>
              <th>Subcategory</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="expense-list">
            <tr id="loading-row">
              <td colspan="6" class="loading">Loading expenses…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <!-- 1. Supabase JS client loaded via CDN (UMD build exposes window.supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- 2. Config — generated by build.js, exposes SUPABASE_URL and SUPABASE_ANON_KEY as globals -->
  <script src="js/config.js"></script>
  <!-- 3. App logic -->
  <script src="js/app.js"></script>
</body>
</html>
